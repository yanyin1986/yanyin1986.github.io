baseURL: 'https://example.org/'
languageCode: 'zh-cn'
title: '歪歪的博客'
paginate: 5
theme: 'PaperMod'

enableRobotsTXT: true

minify:
  disableXML: true
  minifyOutput: true

params:
  env: production # to enable google analytics, opengraph, twitter-cards and schema.
  title: '歪歪的博客'
  description: '一些编程的思考，生活的记录'
  keywords: [Blog, iOS, Life]
  author: Leon.yan

  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: false
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  disableScrollToTop: false
  comments: true
  hidemeta: false
  hideSummary: false
  showtoc: false
  tocopen: false

  profileMode:
    enabled: false
    title: '^-^'
    subtitle: '一些编程的思考，生活的记录'
    buttons:
      - name: Github
        url: "https://github.com/yanyin1986"
      - name: Posts 
        url: "posts/"
      - name: RSS
        url: "index.xml"
